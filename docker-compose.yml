services:
  postgres:
    image: postgres:18-alpine
    container_name: quiz-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quiz_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: pg_isready -U postgres -d quiz_app
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: quiz-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: curl -s http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: quiz-app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/quiz_app
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY: minioadmin
      R2_SECRET_KEY: minioadmin
      R2_BUCKET: quiz-app-files
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
      OPENROUTER_API_KEYS: ${OPENROUTER_API_KEYS:-}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      CLERK_ISSUER_URL: ${CLERK_ISSUER_URL:-}
      NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    entrypoint: >
      sh -c "npm run migrate --workspace=@quiz-app/shared && echo 'App ready at http://localhost:3000' && npm run start"

volumes:
  pgdata:
  miniodata:
